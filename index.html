<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Te quiero mucho</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ff7aa2, #ffb347);
      color: white;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.2);
      max-width: 640px;
    }
    h1 {
      font-size: 2.4rem;
      margin-bottom: 12px;
    }
    p {
      font-size: 1.15rem;
      line-height: 1.7;
    }
    .heart {
      font-size: 3rem;
      margin: 12px 0;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="heart">💖</div>
    <h1>Te quiero mucho</h1>
    <p>Mi amor, solo quería dejarte un mensaje bonito para que sepas que pienso en ti y que te quiero muchísimo. Siempre serás especial para mí.</p>
  </div>
</body>
</html>
